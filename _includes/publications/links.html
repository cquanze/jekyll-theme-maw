{% if site.data.scholar-links.size > 0 %}
<aside>
  <ul class="nav inv">
    {% for link in site.data.scholar-links %}
      {% if link.type == "orcid" %}
      <li><a href="https://orcid.org/{{ link.orcid }}" target="_blank" class="profile-link-icon" aria-label="Link to ORCID author page"><i class="ai ai-orcid"></i></a></li>
      {% else %}
      <li><a href="{{ link.url }}" target="_blank" class="profile-link-icon" aria-label="Link to {{ link.type }} author page"><i class="ai ai-{{ link.type }}"></i></a></li>
      {% endif %}
    {% endfor %}
  </ul>
</aside>
{% endif %}
