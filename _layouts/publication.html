---
layout: default
---

<section class="publication">
  {% if page.title %}
  <h1>{{ page.title }}</h1>
  {% endif %}
  {% if page.link %}
  <p>Publisher Link: <a href="{{ page.link }}">{{ page.title }}</a></p>
  {% endif %}
  {% if page.pdf %}
  <p>PDF: <a href="{{ page.pdf }}">PDF</a></p>
  {% endif %}
  {% if page.date %}
  <p>Published on: {{ page.date | date: "%Y-%m-%d" }}</p>
  {% endif %}
  {{ content }}
</section>
